<!DOCTYPE html>
<html lang="fr">
<head>
<!-- RAPSO_META -->
<!-- RAPSO_DATA -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>RapsoSynthèse - Desktop & Mobile</title>
<style>
  /* ---------- STYLES GÉNÉRAUX ---------- */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --blue: #1a56db; --blue-d: #1447c0; --blue-l: #e8f0fe; --blue-ll: #f0f5ff;
    --gold: #f59e0b; --gold-l: #fef3c7;
    --red: #ef4444; --red-l: #fee2e2; --green: #22c55e; --green-l: #dcfce7;
    --purple: #7c3aed; --purple-l: #ede9fe;
    --g50: #f8fafc; --g100: #f1f5f9; --g200: #e2e8f0; --g300: #cbd5e1;
    --g400: #94a3b8; --g500: #64748b; --g600: #475569; --g700: #334155;
    --g800: #1e293b; --g900: #0f172a;
    --font: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
    --sh: 0 1px 3px rgba(0,0,0,.08);
    --sh-lg: 0 4px 16px rgba(0,0,0,.12);
  }
  body.dark {
    --blue: #4f8ef7; --blue-d: #3b7be0; --blue-l: #1e2a47;
    --gold-l: #3e2a1a; --red-l: #3b1e1e; --green-l: #1a3a2a; --purple-l: #2a1e4a;
    --g50: #0f0f13; --g100: #1a1a22; --g200: #2a2a34; --g300: #3a3a48;
    --g400: #70708a; --g500: #9090aa; --g600: #b0b0c0; --g700: #d0d0e0;
    --g800: #e8e8f0; --g900: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--g100); color: var(--g800); font-family: var(--font);
    font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ========== INTERFACE DESKTOP ========== */
  .desktop-layout {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .syn-header { background: white; border-bottom: 1px solid var(--g200); padding: 6px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .toolbar { background: white; border-bottom: 1px solid var(--g200); padding: 5px 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
  .table-container { flex: 1; overflow: auto; padding: 12px 16px; }
  table { width: 100%; border-collapse: collapse; background: white; font-size: 0.78rem; table-layout: fixed; border: 1px solid var(--g200); }
  th { background: var(--g800); color: white; font-weight: 600; padding: 9px 10px; text-align: left; font-size: 0.72rem; white-space: nowrap; cursor: pointer; user-select: none; border-right: 1px solid var(--g700); }
  td { border-bottom: 1px solid var(--g200); border-right: 1px solid var(--g100); padding: 7px 10px; vertical-align: top; color: var(--g700); font-size: 0.76rem; }
  tr:hover td { background: var(--blue-ll); }
  .badge { display: inline-flex; padding: 1px 7px; font-size: 0.68rem; font-weight: 600; border-radius: 20px; border: 1px solid transparent; }
  .badge-oui { background: var(--green-l); color: #15803d; border-color: #bbf7d0; }
  .badge-par { background: var(--gold-l); color: #92400e; border-color: #fde68a; }
  .badge-non { background: var(--red-l); color: #b91c1c; border-color: #fecaca; }
  .badge-empty { background: var(--g100); color: var(--g500); border-color: var(--g200); }
  .rd6-tag { background: var(--purple-l); color: var(--purple); padding: 0 4px; font-size: 0.6rem; font-weight: 700; margin-left: 4px; border-radius: 4px; }
  .tb-btn { padding: 4px 10px; border: 1px solid var(--g300); background: white; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 0.73rem; font-weight: 500; }
  .tb-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
  .tb-btn.accent { background: var(--blue); border-color: var(--blue); color: white; }
  .quick-search { display: flex; align-items: center; gap: 3px; border: 1px solid var(--g300); padding: 3px 7px; background: white; border-radius: 4px; }
  .mf-select-dropdown { position: absolute; background: white; border: 1px solid var(--g200); display: none; max-height: 250px; overflow-y: auto; z-index: 200; min-width: 180px; box-shadow: var(--sh-lg); }
  .mf-select-dropdown.show { display: block; }
  .edit-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 520px; background: white; box-shadow: -2px 0 12px rgba(0,0,0,0.1); z-index: 801; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.2s ease; }
  .edit-panel.open { transform: translateX(0); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.4); z-index: 800; }
  .overlay.open { display: block; }
  /* colonnes */
  .col-num { width: 70px; } .col-ref { width: 55px; } .col-date { width: 65px; }
  .col-inter { width: 90px; } .col-disp { width: 150px; } .col-avis { width: 45px; }
  .col-desc { width: 130px; } .col-obs { width: 220px; } .col-docs { width: 100px; }
  .col-suivi { width: 65px; } .col-repK { width: 180px; } .col-repL { width: 180px; }
  .col-lots { width: 80px; } .col-actions { width: 50px; }

  /* ========== INTERFACE MOBILE ========== */
  .mobile-layout {
    display: none;
    flex-direction: column;
    height: 100%;
    background: white;
  }
  .mobile-topbar {
    background: var(--g800);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .mobile-topbar .btn-icon {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.85);
    font-size: 1.4rem;
    width: 40px;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 30px;
    cursor: pointer;
  }
  .mobile-topbar .btn-icon:active { background: rgba(255,255,255,0.15); }
  .mobile-topbar .title {
    flex: 1;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .live-indicator { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 40px; }
  .live-dot { width: 10px; height: 10px; border-radius: 10px; background: #aaa; }
  .live-dot.connected { background: #22c55e; animation: pulse 1.5s infinite; }
  .live-dot.disconnected { background: #ef4444; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 #22c55e80; } 70% { box-shadow: 0 0 0 6px #22c55e00; } 100% { box-shadow: 0 0 0 0 #22c55e00; } }

  .mobile-editor { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; }
  .form-card { background: var(--g50); border: 1px solid var(--g200); border-radius: 16px; padding: 12px; }
  .card-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--g500); margin-bottom: 10px; }
  .form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-row label { font-size: 0.7rem; font-weight: 600; color: var(--g600); }
  .form-row input, .form-row textarea { border: 1px solid var(--g300); border-radius: 12px; padding: 10px 12px; font-size: 0.85rem; width: 100%; font-family: var(--font); }
  .readonly-box { background: var(--g100); border-radius: 12px; padding: 10px; font-size: 0.8rem; white-space: pre-wrap; }
  .suivi-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .suivi-opt { flex: 1; border: 1px solid var(--g200); background: white; border-radius: 40px; padding: 8px 4px; text-align: center; font-weight: 600; font-size: 0.75rem; cursor: pointer; }
  .suivi-opt.sel-oui { background: var(--green-l); border-color: var(--green); color: #15803d; }
  .suivi-opt.sel-par { background: var(--gold-l); border-color: var(--gold); color: #92400e; }
  .suivi-opt.sel-non { background: var(--red-l); border-color: var(--red); color: #b91c1c; }
  .rd6-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid var(--g300); border-radius: 40px; background: white; cursor: pointer; }
  .rd6-toggle.active { border-color: var(--purple); background: var(--purple-l); }
  .bottom-nav { display: flex; gap: 8px; padding: 12px 16px; background: white; border-top: 1px solid var(--g200); flex-shrink: 0; }
  .bottom-nav .btn { flex: 1; padding: 12px; border-radius: 40px; font-weight: 700; font-size: 0.85rem; text-align: center; background: var(--g100); border: none; cursor: pointer; }
  .bottom-nav .btn-danger { background: white; border: 1px solid var(--red); color: var(--red); }
  .counter { font-family: var(--mono); background: var(--g200); padding: 6px 16px; border-radius: 40px; font-size: 0.75rem; display: inline-flex; align-items: center; }

  /* Modales communes */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; width: 90%; max-width: 500px; max-height: 85vh; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { padding: 16px; font-weight: 700; border-bottom: 1px solid var(--g200); display: flex; justify-content: space-between; background: var(--g50); }
  .modal-body { padding: 16px; overflow-y: auto; }
  .modal-footer { padding: 12px 16px; border-top: 1px solid var(--g200); display: flex; gap: 8px; justify-content: flex-end; }
  .filter-group { margin-bottom: 20px; }
  .filter-group h4 { font-size: 0.8rem; margin-bottom: 8px; color: var(--g600); }
  .filter-group label { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 0.85rem; }
  .btn { padding: 8px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-secondary { background: var(--g200); color: var(--g700); }
  .empty-state { text-align: center; padding: 40px; color: var(--g400); }

  /* Responsive : masquer desktop et afficher mobile si écran ≤ 768px */
  @media (max-width: 768px) {
    .desktop-layout { display: none !important; }
    .mobile-layout { display: flex !important; }
  }
</style>
</head>
<body>

<!-- ==================== INTERFACE DESKTOP ==================== -->
<div class="desktop-layout" id="desktopLayout">
  <div class="syn-header">
    <div class="header-info"><span class="label">AFFAIRE :</span><span class="value" id="affaireDisplayDesktop">—</span></div>
    <div class="header-info"><span class="label">DOSSIER :</span><input class="value" id="dossierInputDesktop" placeholder="N° dossier" value=""></div>
  </div>
  <div class="toolbar">
    <div class="quick-search"><span class="qs-label">N°</span><input id="qs_num" placeholder="avis" oninput="applyFilters()"></div>
    <div class="quick-search"><span class="qs-label">Date</span><input id="qs_date" placeholder="jj/mm/aaaa" oninput="applyFilters()"></div>
    <div class="quick-search"><span class="qs-label">Disp.</span><input id="qs_disp" placeholder="dispositions" oninput="applyFilters()"></div>
    <div class="quick-search"><span class="qs-label">Obs.</span><input id="qs_obs" placeholder="observations" oninput="applyFilters()"></div>
    <div class="quick-search"><span class="qs-label">Docs</span><input id="qs_docs" placeholder="documents" oninput="applyFilters()"></div>
    <div class="qs-checks">
      <label><input type="checkbox" id="qs_F" onchange="applyFilters()">F</label>
      <label><input type="checkbox" id="qs_S" onchange="applyFilters()">S</label>
      <label><input type="checkbox" id="qs_D" onchange="applyFilters()">D</label>
      <label><input type="checkbox" id="qs_PM" onchange="applyFilters()">PM</label>
      <label><input type="checkbox" id="qs_SO" onchange="applyFilters()">SO</label>
    </div>
    <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" id="fOui" onchange="applyFilters()">Levé</label>
    <label><input type="checkbox" id="fPar" onchange="applyFilters()">Partiel</label>
    <label><input type="checkbox" id="fNon" onchange="applyFilters()">Maintenu</label>
    <label><input type="checkbox" id="fRd6" onchange="applyFilters()">RD6</label>
    <label><input type="checkbox" id="fPA" onchange="applyFilters()">PA</label>
    <div class="mf-select">
      <div class="mf-select-button" onclick="toggleMfSelect('inter')">Intervenants <span id="mfInterCount">(0)</span></div>
      <div class="mf-select-dropdown" id="mfInterDropdown"></div>
    </div>
    <div class="mf-select">
      <div class="mf-select-button" onclick="toggleMfSelect('lot')">Lots <span id="mfLotCount">(0)</span></div>
      <div class="mf-select-dropdown" id="mfLotDropdown"></div>
    </div>
    <button class="tb-btn" onclick="resetFilters()">✕</button>
    <div style="flex:1;"></div>
    <button class="tb-btn accent" onclick="openAddModalDesktop()">+ Ajouter</button>
    <button class="tb-btn accent" onclick="openPAModal()">+ PA</button>
    <button class="tb-btn" onclick="openRapide()">⚡ Vision rapide</button>
    <button class="tb-btn" onclick="openInfoModalDesktop()">ⓘ</button>
    <div class="actions-dropdown">
      <button class="tb-btn" id="actionsBtn" onclick="toggleActionsMenu()">☰ MENU ▾</button>
      <div class="actions-menu" id="actionsMenu" style="position:absolute; background:white; border:1px solid var(--g200); display:none; min-width:210px;">
        <button onclick="openActualiserModal()">⟳ Mettre à jour</button>
        <button onclick="if(checkPasswordBeforeImport()) openImportModal();">↺ Réinitialiser le canevas</button>
        <button onclick="if(checkPasswordBeforeMigration()) openMigrationModal();">⇄ Migration</button>
        <button onclick="exportJSON();">⤓ Enregistrer en local</button>
        <button onclick="loadJSON();">⤒ Ouvrir un dossier local</button>
        <button onclick="openStatsModal();">◔ Statistiques</button>
        <button onclick="printReport();">⎙ Imprimer</button>
        <button onclick="exportWithExcelJS();">⌗ Télécharger l'excel</button>
        <button onclick="toggleColPicker();">☷ Gérer les colonnes</button>
      </div>
    </div>
  </div>
  <div class="table-container">
    <table id="mainTable">
      <thead id="mainThead"><tr id="headerRow"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyStateDesktop" style="display:none">Aucun avis</div>
  </div>
  <div class="overlay" id="overlay" onclick="closePanel()"></div>
  <div class="edit-panel" id="editPanel">
    <div class="panel-hdr">...</div>
    <div class="panel-body">...</div>
    <div class="panel-ftr">...</div>
  </div>
</div>

<!-- ==================== INTERFACE MOBILE ==================== -->
<div class="mobile-layout" id="mobileLayout">
  <div class="mobile-topbar">
    <button class="btn-icon" id="mobileCloseBtn">✕</button>
    <div class="title" id="mobileTitle">—</div>
    <button class="btn-icon" id="mobileFilterBtn">🔍</button>
    <button class="btn-icon" id="mobilePaBtn">+PA</button>
    <button class="btn-icon" id="mobileSyncBtn">⟳</button>
    <button class="btn-icon" id="mobileInfoBtn">ⓘ</button>
    <div class="live-indicator"><span class="live-dot" id="liveDot"></span></div>
    <div class="actions-dropdown" style="position:relative;">
      <button class="btn-icon" id="mobileMenuBtn">☰</button>
      <div class="actions-menu" id="mobileActionsMenu" style="position:absolute; top:100%; right:0; background: var(--g800); border-radius: 12px; min-width: 200px; display: none; flex-direction: column; z-index: 1100;"></div>
    </div>
  </div>
  <div class="mobile-editor" id="mobileEditor"><div class="empty-state">Chargement...</div></div>
  <div class="bottom-nav">
    <button class="btn" id="prevBtn">◀ Précédent</button>
    <span class="counter" id="navCounter">0/0</span>
    <button class="btn" id="nextBtn">Suivant ▶</button>
    <button class="btn btn-danger" id="cancelBtn">Annuler</button>
  </div>
</div>

<!-- MODALES COMMUNES -->
<div class="modal-overlay" id="filterModal"><div class="modal"><div class="modal-header">Filtres <button class="btn-icon" onclick="closeFilterModal()">✕</button></div><div class="modal-body" id="filterModalBody"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="resetFiltersMobile()">Réinitialiser</button><button class="btn btn-primary" onclick="applyFiltersMobile()">Appliquer</button></div></div></div>
<div class="modal-overlay" id="infoProjectModal"><div class="modal"><div class="modal-header">Informations projet</div><div class="modal-body"><div class="form-row"><label>Affaire</label><input type="text" id="infoAffaire" readonly></div><div class="form-row"><label>Dossier</label><input type="text" id="infoDossier" readonly></div></div><div class="modal-footer"><button class="btn btn-primary" onclick="closeInfoProjectModal()">Fermer</button></div></div></div>
<div class="modal-overlay" id="paModal"><div class="modal"><div class="modal-header">Ajouter PA</div><div class="modal-body"><div class="form-row"><label>Catégorie</label><div><label><input type="checkbox" id="pa_F">F</label><label><input type="checkbox" id="pa_S">S</label><label><input type="checkbox" id="pa_D">D</label><label><input type="checkbox" id="pa_PM">PM</label></div></div><div class="form-row"><label>Date</label><input type="date" id="pa_date"></div><div class="form-row"><label>Dispositions</label><textarea id="pa_disp" rows="2"></textarea></div><div class="form-row"><label>Observations</label><textarea id="pa_obs" rows="2"></textarea></div><div class="form-row"><label>Réponses MOE</label><textarea id="pa_repK" rows="2"></textarea></div><div class="form-row"><label>Comm. SOCOTEC</label><textarea id="pa_repL" rows="2"></textarea></div><div class="form-row"><label>Lots</label><input id="pa_lots"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closePAModal()">Annuler</button><button class="btn btn-primary" onclick="addPA()">Ajouter</button></div></div></div>
<div class="modal-overlay" id="importModal"><div class="modal"><div class="modal-header">Importer Excel</div><div class="modal-body"><div class="dropzone" onclick="document.getElementById('fileInput').click()">Glissez un fichier .xlsx</div><input type="file" id="fileInput" accept=".xlsx,.xlsm" style="display:none" onchange="handleFileImport(this)"><div id="importStatus"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeImportModal()">Fermer</button></div></div></div>
<div class="modal-overlay" id="actualiserModal"><div class="modal"><div class="modal-header">Actualiser</div><div class="modal-body"><div class="dropzone" onclick="document.getElementById('actualiserFileInput').click()">Fichier Excel</div><input type="file" id="actualiserFileInput" accept=".xlsx,.xlsm" style="display:none" onchange="handleActualiserFileImport(this)"><div id="actualiserStatus"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeActualiserModal()">Fermer</button></div></div></div>
<div class="modal-overlay" id="migrationModal"><div class="modal"><div class="modal-header">Migration</div><div class="modal-body"><div class="dropzone" onclick="document.getElementById('migrationFileInput').click()">Fichier Excel</div><input type="file" id="migrationFileInput" accept=".xlsx,.xlsm" style="display:none" onchange="handleMigrationFileImport(this)"><div id="migrationStatus"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeMigrationModal()">Fermer</button></div></div></div>
<div class="modal-overlay" id="statsModal"><div class="modal"><div class="modal-header">Statistiques</div><div class="modal-body" id="statsContent"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeStatsModal()">Fermer</button></div></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
// ==================== CORE LOGIC (identique à l'original) ====================
let currentTab = 'v2';
let data = { v2: [], v1: [] };
let filteredRows = [];
let sortKey = null, sortDir = 1;
let selectedIntervenants = new Set();
let selectedLots = new Set();
let editingIdx = null;
let autoSaveTimer = null;
let currentSuiviMobile = '';
let currentMobileIndex = 0;

function ge(id) { return document.getElementById(id); }
function cleanIntervenant(inter) { if(!inter) return ''; const at = inter.indexOf('@'); return at>0 ? inter.substring(0,at).trim() : inter; }
function getLotsArray(r) { const val = r.lots ? r.lots.trim() : ''; return val ? [val] : []; }
function makeRow(o={}) { return { id: o.id || crypto.randomUUID(), num: o.num || '', ref: o.ref || '', date: o.date || '', inter: o.inter || '', disp: o.disp || '', avis: o.avis || '', desc: o.desc || '', obs: o.obs || '', docs: o.docs || '', suivi: o.suivi || '', repK: o.repK || '', repL: o.repL || '', lots: o.lots || '', rd6: o.rd6 || false }; }
function getRows() { return data[currentTab]; }
function fmtDate(d) { if(!d) return ''; if(/^\d{4}-\d{2}-\d{2}$/.test(d)) { const [y,m,day] = d.split('-'); return day+'/'+m+'/'+y; } return d; }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function persistLocal() { try { localStorage.setItem('rapsotracker', JSON.stringify({ meta: { affaire: ge('affaireDisplayDesktop')?.innerText || '', dossier: ge('dossierInputDesktop')?.value || '' }, data })); } catch(e) {} }
function pushToParent() { if(!window.parent || window.parent === window) return; const canId = window.CANEVAS_ID; if(canId === undefined) return; try { const raw = localStorage.getItem('rapsotracker'); if(raw) { const parsed = JSON.parse(raw); if(parsed?.data) window.parent.postMessage({ type: 'rapso_save', canId, data: parsed.data }, '*'); } } catch(e) {} }
setInterval(pushToParent, 4000);
const _origSet = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(k,v){ _origSet(k,v); if(k === 'rapsotracker'){ clearTimeout(window._rsST); window._rsST = setTimeout(pushToParent, 250); } };
window.addEventListener('beforeunload', pushToParent);

window.addEventListener('message', function(e) {
  if(e.data?.type === 'rapso_inject') {
    try {
      const inj = e.data.data || { v2: [], v1: [] };
      data.v2 = Array.isArray(inj.v2) ? inj.v2.map(makeRow) : [];
      data.v1 = Array.isArray(inj.v1) ? inj.v1.map(makeRow) : [];
      if(e.data.affaire) { if(ge('affaireDisplayDesktop')) ge('affaireDisplayDesktop').innerText = e.data.affaire; }
      if(e.data.dossier) { if(ge('dossierInputDesktop')) ge('dossierInputDesktop').value = e.data.dossier; }
      selectedIntervenants.clear(); selectedLots.clear();
      applyFilters();
      if(window.parent) window.parent.postMessage({ type: 'rapso_inject_ack', data: { v2: data.v2, v1: data.v1 } }, '*');
    } catch(err) { console.warn(err); }
  }
  if(e.data?.type === 'rapso_action') {
    const action = e.data.action;
    if(action === 'print') printReport();
    else if(action === 'exportExcel') exportWithExcelJS();
    else if(action === 'stats') openStatsModal();
    else if(action === 'toggleColumns') toggleColPicker();
    else if(action === 'import') if(checkPasswordBeforeImport()) openImportModal();
    else if(action === 'actualiser') openActualiserModal();
    else if(action === 'migration') if(checkPasswordBeforeMigration()) openMigrationModal();
  }
});

function matchDate(stored,q) { if(!q) return true; q=q.trim(); const p=q.split('/'); if(p.length>=2 && stored && /^\d{4}-\d{2}-\d{2}$/.test(stored)){ const[y,m,d]=stored.split('-'), fr=d+'/'+m+'/'+y; if(p.length>=3){ let yy=p[2]; if(yy.length===2) yy='20'+yy; return fr.startsWith(p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+yy); } return fr.startsWith(p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')); } return String(stored||'').toLowerCase().includes(q); }

function applyFilters() {
  const qn = (ge('qs_num')?.value || '').toLowerCase();
  const qd = ge('qs_date')?.value || '';
  const qdi = (ge('qs_disp')?.value || '').toLowerCase();
  const qo = (ge('qs_obs')?.value || '').toLowerCase();
  const qdo = (ge('qs_docs')?.value || '').toLowerCase();
  const qF = ge('qs_F')?.checked || false, qS = ge('qs_S')?.checked || false, qD = ge('qs_D')?.checked || false, qPM = ge('qs_PM')?.checked || false, qSO = ge('qs_SO')?.checked || false;
  const anyQS = qF||qS||qD||qPM||qSO;
  const fOui = ge('fOui')?.checked || false, fPar = ge('fPar')?.checked || false, fNon = ge('fNon')?.checked || false;
  const anySt = fOui||fPar||fNon;
  const fRd6 = ge('fRd6')?.checked || false, fPA = ge('fPA')?.checked || false;
  let rows = getRows().filter(r => {
    if(qn && !String(r.num||'').toLowerCase().includes(qn)) return false;
    if(qd && !matchDate(r.date, qd)) return false;
    if(qdi && !String(r.disp||'').toLowerCase().includes(qdi)) return false;
    if(qo && !String(r.obs||'').toLowerCase().includes(qo)) return false;
    if(qdo && !String(r.docs||'').toLowerCase().includes(qdo)) return false;
    if(anyQS) { const a = (r.avis||'').toUpperCase().trim(); if(!((qF&&a==='F')||(qS&&a==='S')||(qD&&a==='D')||(qPM&&a==='PM')||(qSO&&a==='SO'))) return false; }
    if(anySt) { if(!((fOui&&r.suivi==='Oui')||(fPar&&r.suivi==='Par')||(fNon&&r.suivi==='Non'))) return false; }
    if(fRd6 && !r.rd6) return false;
    if(fPA && !(r.num||'').toUpperCase().startsWith('PA')) return false;
    if(selectedIntervenants.size > 0 && !selectedIntervenants.has(cleanIntervenant(r.inter))) return false;
    if(selectedLots.size > 0) { const lotsArr = getLotsArray(r); if(!lotsArr.some(l=>selectedLots.has(l))) return false; }
    return true;
  });
  if(sortKey) rows.sort((a,b)=>{ const av=String(a[sortKey]||''), bv=String(b[sortKey]||''); return av<bv?-sortDir:av>bv?sortDir:0; });
  filteredRows = rows;
  renderDesktopTable();
  if(window.innerWidth <= 768) renderMobileEditor(currentMobileIndex);
  updateMobileCounter();
}

const COL_DEF = [
  {key:'num', label:'N°', visible:true, width:'70px'},
  {key:'ref', label:'Réf', visible:true, width:'55px'},
  {key:'date', label:'Date', visible:true, width:'65px'},
  {key:'inter', label:'Intervenant', visible:true, width:'90px'},
  {key:'disp', label:'Dispositions', visible:true, width:'150px'},
  {key:'desc', label:'Description', visible:false, width:'130px'},
  {key:'avis', label:'Avis', visible:true, width:'45px'},
  {key:'obs', label:'Observations', visible:true, width:'220px'},
  {key:'docs', label:'Documents', visible:false, width:'100px'},
  {key:'suivi', label:'Suivi', visible:true, width:'65px'},
  {key:'repK', label:'Rép. ENT / MOE', visible:true, width:'180px'},
  {key:'repL', label:'Obs. SOCOTEC', visible:false, width:'180px'},
  {key:'lots', label:'Lots', visible:true, width:'80px'}
];
function rebuildTableHeader() {
  const hr = ge('headerRow'); if(!hr) return;
  hr.innerHTML = '';
  COL_DEF.forEach(c => { if(c.visible) { const th = document.createElement('th'); th.textContent = c.label; th.style.width = c.width; th.onclick = () => sortBy(c.key); hr.appendChild(th); } });
  const thAct = document.createElement('th'); thAct.textContent = ''; thAct.style.width = '50px'; hr.appendChild(thAct);
}
function sortBy(key) { sortKey === key ? sortDir *= -1 : (sortKey = key, sortDir = 1); applyFilters(); }
function renderDesktopTable() {
  const tbody = ge('tableBody'); if(!tbody) return;
  const empty = ge('emptyStateDesktop');
  if(filteredRows.length === 0) { tbody.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = filteredRows.map((r, i) => {
    const badge = r.suivi==='Oui'?'<span class="badge badge-oui">✓ Oui</span>':r.suivi==='Par'?'<span class="badge badge-par">~ Par</span>':r.suivi==='Non'?'<span class="badge badge-non">✗ Non</span>':'<span class="badge badge-empty">—</span>';
    const rd6 = r.rd6 ? '<span class="rd6-tag">RD6</span>' : '';
    let cells = '';
    COL_DEF.forEach(c => {
      if(!c.visible) return;
      if(c.key === 'suivi') cells += `<td data-col="suivi">${badge}</td>`;
      else if(c.key === 'num') cells += `<td data-col="num"><span style="font-family:var(--mono);">${escapeHtml(r.num)}</span>${rd6}</td>`;
      else if(c.key === 'date') cells += `<td data-col="date" style="font-family:var(--mono);white-space:nowrap">${escapeHtml(fmtDate(r.date))}</td>`;
      else if(c.key === 'ref') cells += `<td data-col="ref" style="font-family:var(--mono);">${escapeHtml(r.ref)}</td>`;
      else if(c.key === 'inter') cells += `<td data-col="inter">${escapeHtml(cleanIntervenant(r.inter))}</td>`;
      else cells += `<td data-col="${c.key}">${escapeHtml(r[c.key])}</td>`;
    });
    cells += `<td><button class="tb-btn" onclick="openEditPanelDesktop(${i})">Edit</button></td>`;
    return `<tr>${cells}</tr>`;
  }).join('');
}
function openEditPanelDesktop(idx) { editingIdx = idx; /* à implémenter avec panel latéral */ alert("Panel d'édition desktop (à compléter)"); }
function closePanel() { /* à implémenter */ }

      <div class="form-row"><label>Observations SOCOTEC</label><textarea id="mobile_repL" rows="2" onchange="scheduleAutoSave()">${escapeHtml(r.repL || '')}</textarea></div>

      <div class="card-title">Suivi</div>
      <div class="suivi-group">
        <div class="suivi-opt ${r.suivi === 'Oui' ? 'sel-oui' : ''}" onclick="setSuiviMobile('Oui')">✓ Levé</div>
        <div class="suivi-opt ${r.suivi === 'Par' ? 'sel-par' : ''}" onclick="setSuiviMobile('Par')">~ Partiel</div>
        <div class="suivi-opt ${r.suivi === 'Non' ? 'sel-non' : ''}" onclick="setSuiviMobile('Non')">✗ Maintenu</div>
        <div class="suivi-opt ${!r.suivi ? 'sel-vide' : ''}" onclick="setSuiviMobile('')">—</div>
      </div>

        <input type="checkbox" id="mobile_rd6" ${r.rd6 ? 'checked' : ''} onchange="scheduleAutoSave()"> RD6
      </label>

  `;
  ge('mobileEditor').innerHTML = html;
  updateMobileCounter();
}
function setSuiviMobile(v) {
  currentSuiviMobile = v;
  const r = filteredRows[currentMobileIndex];
  const gi = getRows().findIndex(x => x.id === r.id);
  if(gi !== -1) data[currentTab][gi].suivi = v;
  scheduleAutoSave();
  renderMobileEditor(currentMobileIndex);
}
function toggleRD6Mobile() {
  const cb = ge('mobile_rd6');
  if(cb) cb.checked = !cb.checked;
  scheduleAutoSave();
  const toggle = document.querySelector('.rd6-toggle');
  if(toggle) toggle.classList.toggle('active', cb?.checked);
}
function scheduleAutoSave() {
  if(autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    const r = filteredRows[currentMobileIndex];
    if(!r) return;
    const gi = getRows().findIndex(x => x.id === r.id);
    if(gi === -1) return;
    const repK = ge('mobile_repK')?.value || '';
    const repL = ge('mobile_repL')?.value || '';
    const lots = ge('mobile_lots')?.value || '';
    const rd6 = ge('mobile_rd6')?.checked || false;
    data[currentTab][gi] = { ...r, repK, repL, lots, suivi: currentSuiviMobile, rd6 };
    if(data[currentTab][gi].rd6 && !data[currentTab][gi].num.includes('/RD6')) data[currentTab][gi].num += '/RD6';
    else if(!data[currentTab][gi].rd6) data[currentTab][gi].num = data[currentTab][gi].num.replace('/RD6','');
    persistLocal(); pushToParent();
    autoSaveTimer = null;
  }, 500);
}
function updateMobileCounter() { ge('navCounter').innerText = filteredRows.length ? `${currentMobileIndex+1}/${filteredRows.length}` : '0/0'; }
function prevAvis() { if(currentMobileIndex > 0) { currentMobileIndex--; renderMobileEditor(currentMobileIndex); } }
function nextAvis() { if(currentMobileIndex < filteredRows.length-1) { currentMobileIndex++; renderMobileEditor(currentMobileIndex); } }

function syncMobile() { pushToParent(); alert('Synchronisation demandée'); }

function buildFilterModal() {
  const rows = getRows();
  const intervenants = [...new Set(rows.map(r => cleanIntervenant(r.inter)).filter(v=>v))];
  const lots = [...new Set(rows.flatMap(r=>getLotsArray(r)))];
  let html = `<div class="filter-group"><h4>Intervenants</h4>${intervenants.map(i => `<label><input type="checkbox" data-filter="inter" value="${escapeHtml(i)}" ${selectedIntervenants.has(i) ? 'checked' : ''}> ${escapeHtml(i)}</label>`).join('')}</div>
    <div class="filter-group"><h4>Lots</h4>${lots.map(l => `<label><input type="checkbox" data-filter="lot" value="${escapeHtml(l)}" ${selectedLots.has(l) ? 'checked' : ''}> ${escapeHtml(l)}</label>`).join('')}</div>
    <div class="filter-group"><h4>Avis</h4><label><input type="checkbox" id="qf_F" ${ge('qs_F')?.checked ? 'checked' : ''}> F</label><label><input type="checkbox" id="qf_S" ${ge('qs_S')?.checked ? 'checked' : ''}> S</label><label><input type="checkbox" id="qf_D" ${ge('qs_D')?.checked ? 'checked' : ''}> D</label></div>
    <div class="filter-group"><h4>Suivi</h4><label><input type="checkbox" id="qf_oui" ${ge('fOui')?.checked ? 'checked' : ''}> Levé</label><label><input type="checkbox" id="qf_par" ${ge('fPar')?.checked ? 'checked' : ''}> Partiel</label><label><input type="checkbox" id="qf_non" ${ge('fNon')?.checked ? 'checked' : ''}> Maintenu</label></div>
    <div class="filter-group"><label><input type="checkbox" id="qf_rd6" ${ge('fRd6')?.checked ? 'checked' : ''}> RD6</label><label><input type="checkbox" id="qf_pa" ${ge('fPA')?.checked ? 'checked' : ''}> PA</label></div>`;
  ge('filterModalBody').innerHTML = html;
}

  selectedIntervenants.clear(); [...document.querySelectorAll('#filterModalBody input[data-filter="inter"]:checked')].forEach(cb => selectedIntervenants.add(cb.value));
  selectedLots.clear(); [...document.querySelectorAll('#filterModalBody input[data-filter="lot"]:checked')].forEach(cb => selectedLots.add(cb.value));
  if(ge('qs_F')) ge('qs_F').checked = ge('qf_F').checked;
  if(ge('qs_S')) ge('qs_S').checked = ge('qf_S').checked;
  if(ge('qs_D')) ge('qs_D').checked = ge('qf_D').checked;
  if(ge('fOui')) ge('fOui').checked = ge('qf_oui').checked;
  if(ge('fPar')) ge('fPar').checked = ge('qf_par').checked;
  if(ge('fNon')) ge('fNon').checked = ge('qf_non').checked;
  if(ge('fRd6')) ge('fRd6').checked = ge('qf_rd6').checked;
  if(ge('fPA')) ge('fPA').checked = ge('qf_pa').checked;

}
