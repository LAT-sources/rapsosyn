<!DOCTYPE html>
<html lang="fr">
<head>
<!-- RAPSO_META -->
<!-- RAPSO_DATA -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>RapsoSynthèse - Édition avis</title>
<style>
  /* ---------- STYLES IDENTIQUES AU VOLET LATERAL ORIGINAL ---------- */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --blue: #1a56db; --blue-d: #1447c0; --blue-l: #e8f0fe; --blue-ll: #f0f5ff;
    --gold: #f59e0b; --gold-l: #fef3c7;
    --red: #ef4444; --red-l: #fee2e2; --green: #22c55e; --green-l: #dcfce7;
    --purple: #7c3aed; --purple-l: #ede9fe;
    --g50: #f8fafc; --g100: #f1f5f9; --g200: #e2e8f0; --g300: #cbd5e1;
    --g400: #94a3b8; --g500: #64748b; --g600: #475569; --g700: #334155;
    --g800: #1e293b; --g900: #0f172a;
    --font: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
    --sh: 0 1px 3px rgba(0,0,0,.08);
    --sh-lg: 0 4px 16px rgba(0,0,0,.12);
    --radius: 12px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: white;
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- PANEL PLEIN ÉCRAN (exactement le volet latéral) ---------- */
  .edit-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    background: white;
    box-shadow: none;
    transform: none !important;
  }

  .panel-hdr {
    padding: 10px 16px;
    border-bottom: 1px solid var(--g200);
    background: var(--g50);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .panel-hdr .title {
    font-weight: 600;
    font-size: 0.85rem;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel-hdr .btn-icon {
    background: transparent;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 30px;
    color: var(--g600);
  }
  .panel-hdr .btn-icon:active {
    background: var(--g200);
  }
  .tb-btn {
    padding: 4px 10px;
    border: 1px solid var(--g300);
    background: white;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 0.73rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .tb-btn.green {
    background: #16a34a;
    border-color: #16a34a;
    color: white;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .panel-ftr {
    padding: 10px 16px;
    border-top: 1px solid var(--g200);
    display: flex;
    gap: 8px;
    background: var(--g50);
    flex-shrink: 0;
  }

  /* Sections du formulaire (inchangées) */
  .form-section {
    background: white;
    border: 1px solid var(--g200);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--g500);
    background: var(--g50);
    padding: 10px 12px;
    border-bottom: 1px solid var(--g200);
    letter-spacing: 0.05em;
  }
  .section-content {
    padding: 12px;
  }
  .obs-readonly {
    background: var(--g100);
    border: 1px solid var(--g200);
    border-radius: 8px;
    padding: 10px;
    font-size: 0.8rem;
    white-space: pre-wrap;
    color: var(--g700);
    line-height: 1.45;
  }
  .form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .form-row label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--g600);
  }
  .form-row input, .form-row textarea {
    border: 1px solid var(--g300);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: var(--font);
    font-size: 0.8rem;
    background: white;
    outline: none;
    width: 100%;
  }
  .form-row input:focus, .form-row textarea:focus {
    border-color: var(--blue);
  }
  .suivi-opts {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .suivi-opt {
    flex: 1;
    border: 1px solid var(--g200);
    background: white;
    border-radius: 40px;
    padding: 8px 4px;
    text-align: center;
    font-weight: 600;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.1s;
  }
  .suivi-opt.sel-oui { background: var(--green-l); border-color: var(--green); color: #15803d; }
  .suivi-opt.sel-par { background: var(--gold-l); border-color: var(--gold); color: #92400e; }
  .suivi-opt.sel-non { background: var(--red-l); border-color: var(--red); color: #b91c1c; }
  .rd6-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--g300);
    border-radius: 40px;
    background: white;
    cursor: pointer;
  }
  .rd6-toggle.active {
    border-color: var(--purple);
    background: var(--purple-l);
  }

  /* Modales (filtres, PA) */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    width: 90%;
    max-width: 500px;
    max-height: 85vh;
    border-radius: 28px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    padding: 16px;
    font-weight: 700;
    border-bottom: 1px solid var(--g200);
    display: flex;
    justify-content: space-between;
    background: var(--g50);
  }
  .modal-body { padding: 16px; overflow-y: auto; }
  .modal-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--g200);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .filter-group { margin-bottom: 20px; }
  .filter-group h4 { font-size: 0.8rem; margin-bottom: 8px; color: var(--g600); }
  .filter-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0;
    font-size: 0.85rem;
  }
  .empty-state { text-align: center; padding: 40px; color: var(--g400); }
</style>
</head>
<body>

<!-- PANEL ÉDITION (plein écran) -->
<div class="edit-panel" id="editPanel">
  <div class="panel-hdr">
    <span class="title" id="panelTitle">Avis n°: —</span>
    <span style="font-family:var(--mono);font-size:0.7rem;" id="panelNum">—</span>
    <button class="tb-btn" id="prevBtn">Préc ↑</button>
    <button class="tb-btn" id="nextBtn">↓ Sui</button>
    <!-- Nouveaux boutons icônes (fermer, filtre, +PA) -->
    <button class="btn-icon" id="filterIcon" title="Filtres">🔍</button>
    <button class="btn-icon" id="paIcon" title="Ajouter PA">+PA</button>
    <button class="btn-icon" id="closeIcon" title="Fermer">✕</button>
  </div>
  <div class="panel-body" id="panelBody">
    <!-- Contenu dynamique -->
  </div>
  <div class="panel-ftr">
    <button class="tb-btn green" id="saveBtn">Enregistrer</button>
    <button class="tb-btn" id="deleteBtn" style="color:var(--red);border-color:var(--red);">Supprimer</button>
    <button class="tb-btn" id="cancelBtn">Annuler</button>
    <span class="save-feedback" id="saveFeedback">✓ Enregistré !</span>
  </div>
</div>

<!-- MODALE FILTRES -->
<div class="modal-overlay" id="filterModal">
  <div class="modal">
    <div class="modal-header">Filtres <button class="btn-icon" onclick="closeFilterModal()" style="background:none;border:none;font-size:1.2rem;">✕</button></div>
    <div class="modal-body" id="filterModalBody"></div>
    <div class="modal-footer">
      <button class="tb-btn" onclick="resetFilters()">Réinitialiser</button>
      <button class="tb-btn green" onclick="applyFiltersFromModal()">Appliquer</button>
    </div>
  </div>
</div>

<!-- MODALE AJOUT PA -->
<div class="modal-overlay" id="paModal">
  <div class="modal">
    <div class="modal-header">Ajouter PA</div>
    <div class="modal-body">
      <div class="filter-group"><label><input type="checkbox" id="pa_F"> F</label><label><input type="checkbox" id="pa_S"> S</label><label><input type="checkbox" id="pa_D"> D</label><label><input type="checkbox" id="pa_PM"> PM</label></div>
      <div class="filter-group"><label>Date</label><input type="date" id="pa_date" style="width:100%; padding:8px;"></div>
      <div class="filter-group"><label>Dispositions</label><textarea id="pa_disp" rows="2" style="width:100%;"></textarea></div>
      <div class="filter-group"><label>Observations</label><textarea id="pa_obs" rows="2" style="width:100%;"></textarea></div>
      <div class="filter-group"><label>Réponses MOE</label><textarea id="pa_repK" rows="2" style="width:100%;"></textarea></div>
      <div class="filter-group"><label>Comm. SOCOTEC</label><textarea id="pa_repL" rows="2" style="width:100%;"></textarea></div>
      <div class="filter-group"><label>Lots</label><input id="pa_lots" style="width:100%;"></div>
    </div>
    <div class="modal-footer">
      <button class="tb-btn" onclick="closePAModal()">Annuler</button>
      <button class="tb-btn green" onclick="addPA()">Ajouter</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
  // ==================== CŒUR MÉTIER (exactement le même que le volet latéral original) ====================
  let currentTab = 'v2';
  let data = { v2: [], v1: [] };
  let filteredRows = [];
  let editingIdx = null;
  let autoSaveTimer = null;
  let currentSuivi = '';
  let selectedIntervenants = new Set();
  let selectedLots = new Set();

  function ge(id) { return document.getElementById(id); }
  function cleanIntervenant(inter) { if(!inter) return ''; const at = inter.indexOf('@'); return at>0 ? inter.substring(0,at).trim() : inter; }
  function getLotsArray(r) { const val = r.lots ? r.lots.trim() : ''; return val ? [val] : []; }
  function makeRow(o={}) { return { id: o.id || crypto.randomUUID(), num: o.num || '', ref: o.ref || '', date: o.date || '', inter: o.inter || '', disp: o.disp || '', avis: o.avis || '', desc: o.desc || '', obs: o.obs || '', docs: o.docs || '', suivi: o.suivi || '', repK: o.repK || '', repL: o.repL || '', lots: o.lots || '', rd6: o.rd6 || false }; }
  function getRows() { return data[currentTab]; }
  function fmtDate(d) { if(!d) return ''; if(/^\d{4}-\d{2}-\d{2}$/.test(d)) { const [y,m,day] = d.split('-'); return day+'/'+m+'/'+y; } return d; }
  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function persistLocal() { try { localStorage.setItem('rapsotracker', JSON.stringify({ meta: { affaire: window.RAPSO_AFFAIRE || '', dossier: window.RAPSO_DOSSIER || '' }, data })); } catch(e) {} }
  function pushToParent() { if(!window.parent || window.parent === window) return; const canId = window.CANEVAS_ID; if(canId === undefined) return; try { const raw = localStorage.getItem('rapsotracker'); if(raw) { const parsed = JSON.parse(raw); if(parsed?.data) window.parent.postMessage({ type: 'rapso_save', canId, data: parsed.data }, '*'); } } catch(e) {} }
  setInterval(pushToParent, 4000);
  const _origSet = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(k,v){ _origSet(k,v); if(k === 'rapsotracker'){ clearTimeout(window._rsST); window._rsST = setTimeout(pushToParent, 250); } };
  window.addEventListener('beforeunload', pushToParent);

  window.addEventListener('message', function(e) {
    if(e.data?.type === 'rapso_inject') {
      try {
        const inj = e.data.data || { v2: [], v1: [] };
        data.v2 = Array.isArray(inj.v2) ? inj.v2.map(makeRow) : [];
        data.v1 = Array.isArray(inj.v1) ? inj.v1.map(makeRow) : [];
        if(e.data.affaire) window.RAPSO_AFFAIRE = e.data.affaire;
        if(e.data.dossier) window.RAPSO_DOSSIER = e.data.dossier;
        selectedIntervenants.clear(); selectedLots.clear();
        applyFilters();
        if(window.parent) window.parent.postMessage({ type: 'rapso_inject_ack', data: { v2: data.v2, v1: data.v1 } }, '*');
      } catch(err) { console.warn(err); }
    }
    if(e.data?.type === 'rapso_action') {
      const action = e.data.action;
      if(action === 'print') printReport();
      else if(action === 'exportExcel') exportWithExcelJS();
      else if(action === 'stats') openStatsModal();
      else if(action === 'toggleColumns') toggleColPicker();
      else if(action === 'import') if(checkPasswordBeforeImport()) openImportModal();
      else if(action === 'actualiser') openActualiserModal();
      else if(action === 'migration') if(checkPasswordBeforeMigration()) openMigrationModal();
    }
  });

  function matchDate(stored,q) { if(!q) return true; q=q.trim(); const p=q.split('/'); if(p.length>=2 && stored && /^\d{4}-\d{2}-\d{2}$/.test(stored)){ const[y,m,d]=stored.split('-'), fr=d+'/'+m+'/'+y; if(p.length>=3){ let yy=p[2]; if(yy.length===2) yy='20'+yy; return fr.startsWith(p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+yy); } return fr.startsWith(p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')); } return String(stored||'').toLowerCase().includes(q); }

  function applyFilters() {
    const qn = (ge('qs_num')?.value || '').toLowerCase();
    const qd = ge('qs_date')?.value || '';
    const qdi = (ge('qs_disp')?.value || '').toLowerCase();
    const qo = (ge('qs_obs')?.value || '').toLowerCase();
    const qdo = (ge('qs_docs')?.value || '').toLowerCase();
    const qF = ge('qs_F')?.checked || false, qS = ge('qs_S')?.checked || false, qD = ge('qs_D')?.checked || false, qPM = ge('qs_PM')?.checked || false, qSO = ge('qs_SO')?.checked || false;
    const anyQS = qF||qS||qD||qPM||qSO;
    const fOui = ge('fOui')?.checked || false, fPar = ge('fPar')?.checked || false, fNon = ge('fNon')?.checked || false;
    const anySt = fOui||fPar||fNon;
    const fRd6 = ge('fRd6')?.checked || false, fPA = ge('fPA')?.checked || false;
    let rows = getRows().filter(r => {
      if(qn && !String(r.num||'').toLowerCase().includes(qn)) return false;
      if(qd && !matchDate(r.date, qd)) return false;
      if(qdi && !String(r.disp||'').toLowerCase().includes(qdi)) return false;
      if(qo && !String(r.obs||'').toLowerCase().includes(qo)) return false;
      if(qdo && !String(r.docs||'').toLowerCase().includes(qdo)) return false;
      if(anyQS) { const a = (r.avis||'').toUpperCase().trim(); if(!((qF&&a==='F')||(qS&&a==='S')||(qD&&a==='D')||(qPM&&a==='PM')||(qSO&&a==='SO'))) return false; }
      if(anySt) { if(!((fOui&&r.suivi==='Oui')||(fPar&&r.suivi==='Par')||(fNon&&r.suivi==='Non'))) return false; }
      if(fRd6 && !r.rd6) return false;
      if(fPA && !(r.num||'').toUpperCase().startsWith('PA')) return false;
      if(selectedIntervenants.size > 0 && !selectedIntervenants.has(cleanIntervenant(r.inter))) return false;
      if(selectedLots.size > 0) { const lotsArr = getLotsArray(r); if(!lotsArr.some(l=>selectedLots.has(l))) return false; }
      return true;
    });
    filteredRows = rows;
    if(editingIdx !== null && editingIdx >= filteredRows.length) editingIdx = Math.max(0, filteredRows.length-1);
    if(editingIdx === null && filteredRows.length > 0) editingIdx = 0;
    renderCurrentAvis();
    updateNavCounter();
  }

  function renderCurrentAvis() {
    if(filteredRows.length === 0) {
      ge('panelBody').innerHTML = '<div class="empty-state">Aucun avis correspondant</div>';
      ge('panelTitle').innerHTML = 'Aucun avis';
      ge('panelNum').innerText = '';
      return;
    }
    const r = filteredRows[editingIdx];
    currentSuivi = r.suivi || '';
    ge('panelTitle').innerHTML = `Avis n°: ${r.num||'(vide)'} - ${r.ref||'-'} - ${fmtDate(r.date)||'-'} - ${cleanIntervenant(r.inter)||'-'} - Avis : ${r.avis||'-'}`;
    ge('panelNum').innerText = r.num||'(sans n°)';
    const html = `
      <div class="form-section">
        <div class="section-title">Dispositions examinées</div>
        <div class="section-content">${escapeHtml(r.disp) || '—'}</div>
      </div>
      <div class="form-section">
        <div class="section-title">Observations</div>
        <div class="section-content"><div class="obs-readonly">${escapeHtml(r.obs) || '—'}</div></div>
      </div>
      <div class="form-section">
        <div class="section-title">Réponses</div>
        <div class="section-content">
          <div class="form-row"><label>Réponses ENT / MOE</label><textarea id="e_repK" rows="3" oninput="scheduleAutoSave()">${escapeHtml(r.repK || '')}</textarea></div>
          <div class="form-row"><label>Observations-commentaires SOCOTEC</label><textarea id="e_repL" rows="3" oninput="scheduleAutoSave()">${escapeHtml(r.repL || '')}</textarea></div>
          <div class="form-row"><label>Lots concernés</label><input type="text" id="e_lots" value="${escapeHtml(r.lots || '')}" oninput="scheduleAutoSave()"></div>
        </div>
      </div>
      <div class="form-section">
        <div class="section-title">Statut de suivi</div>
        <div class="section-content">
          <div class="suivi-opts">
            <div class="suivi-opt ${r.suivi === 'Oui' ? 'sel-oui' : ''}" onclick="setSuivi('Oui')">✓ Levé</div>
            <div class="suivi-opt ${r.suivi === 'Par' ? 'sel-par' : ''}" onclick="setSuivi('Par')">~ Partiel</div>
            <div class="suivi-opt ${r.suivi === 'Non' ? 'sel-non' : ''}" onclick="setSuivi('Non')">✗ Maintenu</div>
            <div class="suivi-opt ${!r.suivi ? 'sel-vide' : ''}" onclick="setSuivi('')">—</div>
          </div>
          <label class="rd6-toggle ${r.rd6 ? 'active' : ''}" onclick="toggleRD6()">
            <input type="checkbox" id="e_rd6" ${r.rd6 ? 'checked' : ''} onchange="scheduleAutoSave()"> RD6
          </label>
        </div>
      </div>
    `;
    ge('panelBody').innerHTML = html;
  }

  function setSuivi(v) {
    currentSuivi = v;
    const r = filteredRows[editingIdx];
    const gi = getRows().findIndex(x => x.id === r.id);
    if(gi !== -1) data[currentTab][gi].suivi = v;
    scheduleAutoSave();
    renderCurrentAvis();
  }

  function toggleRD6() {
    const cb = ge('e_rd6');
    if(cb) cb.checked = !cb.checked;
    scheduleAutoSave();
    const toggle = document.querySelector('.rd6-toggle');
    if(toggle) toggle.classList.toggle('active', cb?.checked);
  }

  function scheduleAutoSave() {
    if(autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      const r = filteredRows[editingIdx];
      if(!r) return;
      const gi = getRows().findIndex(x => x.id === r.id);
      if(gi === -1) return;
      const repK = ge('e_repK')?.value || '';
      const repL = ge('e_repL')?.value || '';
      const lots = ge('e_lots')?.value || '';
      const rd6 = ge('e_rd6')?.checked || false;
      data[currentTab][gi] = { ...r, repK, repL, lots, suivi: currentSuivi, rd6 };
      if(data[currentTab][gi].rd6 && !data[currentTab][gi].num.includes('/RD6')) data[currentTab][gi].num += '/RD6';
      else if(!data[currentTab][gi].rd6) data[currentTab][gi].num = data[currentTab][gi].num.replace('/RD6','');
      persistLocal(); pushToParent();
      const fb = ge('saveFeedback');
      if(fb) { fb.classList.add('show'); setTimeout(() => fb.classList.remove('show'), 1500); }
      autoSaveTimer = null;
    }, 500);
  }

  function saveRow() { scheduleAutoSave(); }
  function deleteRow() {
    if(editingIdx === null) return;
    const r = filteredRows[editingIdx];
    if(!confirm(`Supprimer définitivement l'avis ${r.num} ?`)) return;
    const gi = getRows().findIndex(x => x.id === r.id);
    if(gi >= 0) { data[currentTab].splice(gi,1); applyFilters(); persistLocal(); pushToParent(); }
  }
  function navRow(delta) {
    if(editingIdx !== null) {
      let n = editingIdx + delta;
      if(n >= 0 && n < filteredRows.length) {
        editingIdx = n;
        renderCurrentAvis();
        updateNavCounter();
      }
    }
  }
  function updateNavCounter() {
    // pas nécessaire pour l'affichage, mais on peut laisser
  }
  function closePanel() {
    if(window.parent) window.parent.postMessage({ type: 'close_synthese' }, '*');
    else window.location.href = 'about:blank';
  }

  // Filtres modale
  function buildFilterModal() {
    const rows = getRows();
    const intervenants = [...new Set(rows.map(r => cleanIntervenant(r.inter)).filter(v=>v))];
    const lots = [...new Set(rows.flatMap(r=>getLotsArray(r)))];
    let html = `<div class="filter-group"><h4>Intervenants</h4>${intervenants.map(i => `<label><input type="checkbox" data-filter="inter" value="${escapeHtml(i)}" ${selectedIntervenants.has(i) ? 'checked' : ''}> ${escapeHtml(i)}</label>`).join('')}</div>
      <div class="filter-group"><h4>Lots</h4>${lots.map(l => `<label><input type="checkbox" data-filter="lot" value="${escapeHtml(l)}" ${selectedLots.has(l) ? 'checked' : ''}> ${escapeHtml(l)}</label>`).join('')}</div>
      <div class="filter-group"><h4>Avis</h4><label><input type="checkbox" id="qf_F" ${ge('qs_F')?.checked ? 'checked' : ''}> F</label><label><input type="checkbox" id="qf_S" ${ge('qs_S')?.checked ? 'checked' : ''}> S</label><label><input type="checkbox" id="qf_D" ${ge('qs_D')?.checked ? 'checked' : ''}> D</label></div>
      <div class="filter-group"><h4>Suivi</h4><label><input type="checkbox" id="qf_oui" ${ge('fOui')?.checked ? 'checked' : ''}> Levé</label><label><input type="checkbox" id="qf_par" ${ge('fPar')?.checked ? 'checked' : ''}> Partiel</label><label><input type="checkbox" id="qf_non" ${ge('fNon')?.checked ? 'checked' : ''}> Maintenu</label></div>
      <div class="filter-group"><label><input type="checkbox" id="qf_rd6" ${ge('fRd6')?.checked ? 'checked' : ''}> RD6</label><label><input type="checkbox" id="qf_pa" ${ge('fPA')?.checked ? 'checked' : ''}> PA</label></div>`;
    ge('filterModalBody').innerHTML = html;
  }
  function applyFiltersFromModal() {
    selectedIntervenants.clear(); [...document.querySelectorAll('#filterModalBody input[data-filter="inter"]:checked')].forEach(cb => selectedIntervenants.add(cb.value));
    selectedLots.clear(); [...document.querySelectorAll('#filterModalBody input[data-filter="lot"]:checked')].forEach(cb => selectedLots.add(cb.value));
    if(ge('qs_F')) ge('qs_F').checked = ge('qf_F').checked;
    if(ge('qs_S')) ge('qs_S').checked = ge('qf_S').checked;
    if(ge('qs_D')) ge('qs_D').checked = ge('qf_D').checked;
    if(ge('fOui')) ge('fOui').checked = ge('qf_oui').checked;
    if(ge('fPar')) ge('fPar').checked = ge('qf_par').checked;
    if(ge('fNon')) ge('fNon').checked = ge('qf_non').checked;
    if(ge('fRd6')) ge('fRd6').checked = ge('qf_rd6').checked;
    if(ge('fPA')) ge('fPA').checked = ge('qf_pa').checked;
    applyFilters(); closeFilterModal();
  }
  function resetFilters() {
    selectedIntervenants.clear(); selectedLots.clear();
    if(ge('qs_F')) ge('qs_F').checked = false;
    if(ge('qs_S')) ge('qs_S').checked = false;
    if(ge('qs_D')) ge('qs_D').checked = false;
    if(ge('fOui')) ge('fOui').checked = false;
    if(ge('fPar')) ge('fPar').checked = false;
    if(ge('fNon')) ge('fNon').checked = false;
    if(ge('fRd6')) ge('fRd6').checked = false;
    if(ge('fPA')) ge('fPA').checked = false;
    applyFilters(); closeFilterModal();
  }
  function openFilterModal() { buildFilterModal(); ge('filterModal').classList.add('open'); }
  function closeFilterModal() { ge('filterModal').classList.remove('open'); }
  function openPAModal() { ge('paModal').classList.add('open'); }
  function closePAModal() { ge('paModal').classList.remove('open'); }
  function addPA() {
    const cat = ge('pa_F').checked ? 'F' : ge('pa_S').checked ? 'S' : ge('pa_D').checked ? 'D' : ge('pa_PM').checked ? 'PM' : '';
    if(!cat) { alert('Cochez une catégorie'); return; }
    let maxPA=0; getRows().forEach(r => { if((r.num||'').startsWith('PA')){ let n=parseInt(r.num.replace('PA','')); if(n>maxPA) maxPA=n; } });
    data[currentTab].push(makeRow({ num:'PA'+(maxPA+1), date:ge('pa_date').value||new Date().toISOString().slice(0,10), disp:ge('pa_disp').value, avis:cat, obs:ge('pa_obs').value, repK:ge('pa_repK').value, repL:ge('pa_repL').value, lots:ge('pa_lots').value }));
    closePAModal(); applyFilters(); persistLocal(); pushToParent();
  }

  // Fonctions pour les actions héritées (non utilisées en mobile mais gardées)
  function openImportModal() { alert("Import Excel"); }
  function openActualiserModal() { alert("Actualiser"); }
  function openMigrationModal() { alert("Migration"); }
  function openStatsModal() { alert("Statistiques"); }
  function exportWithExcelJS() { alert("Export Excel"); }
  function printReport() { window.print(); }
  function toggleColPicker() { alert("Gestion colonnes"); }
  function checkPasswordBeforeImport() { return true; }
  function checkPasswordBeforeMigration() { return true; }

  // Initialisation
  window.addEventListener('DOMContentLoaded', () => {
    const hiddenDiv = document.createElement('div'); hiddenDiv.style.display = 'none';
    hiddenDiv.innerHTML = `<input id="qs_num"><input id="qs_date"><input id="qs_disp"><input id="qs_obs"><input id="qs_docs"><input type="checkbox" id="qs_F"><input type="checkbox" id="qs_S"><input type="checkbox" id="qs_D"><input type="checkbox" id="qs_PM"><input type="checkbox" id="qs_SO"><input type="checkbox" id="fOui"><input type="checkbox" id="fPar"><input type="checkbox" id="fNon"><input type="checkbox" id="fRd6"><input type="checkbox" id="fPA">`;
    document.body.appendChild(hiddenDiv);
    const stored = localStorage.getItem('rapsotracker');
    if(stored) {
      try { const p = JSON.parse(stored); if(p.data) data = p.data; } catch(e) {}
    }
    applyFilters();
    ge('prevBtn').onclick = () => navRow(-1);
    ge('nextBtn').onclick = () => navRow(1);
    ge('cancelBtn').onclick = closePanel;
    ge('saveBtn').onclick = saveRow;
    ge('deleteBtn').onclick = deleteRow;
    ge('filterIcon').onclick = openFilterModal;
    ge('paIcon').onclick = openPAModal;
    ge('closeIcon').onclick = closePanel;
  });
</script>
</body>
</html>
