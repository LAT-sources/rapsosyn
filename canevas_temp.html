<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ====================== CORRECTION UNIQUE ======================
// Seule la fonction processXLSX a été modifiée pour lire la colonne des lots (M / index 12)
// Toutes les autres fonctions (getLotsArray, buildMfSelectOptions, applyFilters, etc.) sont déjà correctes.

const TEMPLATE_URL = 'https://raw.githubusercontent.com/LAT-sources/rapsosyn/refs/heads/main/temp.xlsx';

// --- Thème ---
function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('rapso_theme',document.body.classList.contains('dark')?'dark':'light');}
(()=>{if((localStorage.getItem('rapso_theme')||'light')==='dark')document.body.classList.add('dark');})();

// --- Données globales ---
let currentTab='v2', data={v2:[], v1:[]}, filteredRows=[], sortKey=null, sortDir=1, editingIdx=null, currentSuivi='';
let selectedIntervenants = new Set();
let selectedLots = new Set();

function cleanIntervenant(inter){if(!inter)return '';const at=inter.indexOf('@');return at>0?inter.substring(0,at).trim():inter;}

// Retourne le lot exact (tableau d'un seul élément)
function getLotsArray(r) {
    const val = r.lots ? r.lots.trim() : '';
    return val ? [val] : [];
}

function persistLocal(){try{localStorage.setItem('rapsotracker',JSON.stringify({meta:{affaire:ge('affaireDisplay').innerText,dossier:ge('dossierInput').value},data}));}catch(e){}}
function pushToParent(){if(!window.parent||window.parent===window)return;const canId=window.CANEVAS_ID;if(canId===undefined)return;try{const raw=localStorage.getItem('rapsotracker');if(raw){const parsed=JSON.parse(raw);if(parsed?.data)window.parent.postMessage({type:'rapso_save',canId,data:parsed.data},'*');}}catch(e){}}
setInterval(pushToParent,4000);const _origSet=localStorage.setItem.bind(localStorage);
localStorage.setItem=function(k,v){_origSet(k,v);if(k==='rapsotracker'){clearTimeout(window._rsST);window._rsST=setTimeout(pushToParent,250);}};
window.addEventListener('beforeunload',pushToParent);
window.addEventListener('message', function(e) {
  if (e.data?.type === 'rapso_request_save') pushToParent();
  if (e.data?.type === 'rapso_inject') {
    try {
      const inj = e.data.data || { v2: [], v1: [] };
      data.v2 = Array.isArray(inj.v2) ? inj.v2.map(makeRow) : [];
      data.v1 = Array.isArray(inj.v1) ? inj.v1.map(makeRow) : [];
      if (e.data.affaire) { ge('affaireDisplay').innerText = e.data.affaire; const rapTitle = document.getElementById('rapideAffaireTitle'); if (rapTitle) rapTitle.innerText = cleanAffaireForRapide(e.data.affaire); }
      if (e.data.dossier) ge('dossierInput').value = e.data.dossier;
      selectedIntervenants.clear(); selectedLots.clear();
      persistLocal(); applyFilters();
      if (window.parent) window.parent.postMessage({ type: 'rapso_inject_ack', data: { v2: data.v2, v1: data.v1 } }, '*');
    } catch (err) { console.warn(err); }
  }
  if (e.data?.type === 'rapso_action') {
    const action = e.data.action;
    switch (action) {
      case 'import': if (checkPasswordBeforeImport()) openImportModal(); break;
      case 'actualiser': openActualiserModal(); break;
      case 'migration': if (checkPasswordBeforeMigration()) openMigrationModal(); break;
      case 'stats': openStatsModal(); break;
      case 'exportJSON': exportJSON(); break;
      case 'loadJSON': loadJSON(); break;
      case 'print': window.print(); break;
      case 'exportExcel': exportWithExcelJS(); break;
      case 'toggleColumns': toggleColPicker(); break;
    }
  }
});

(function(){if(window.RAPSO_SYNTH_DATA){try{const p=JSON.parse(window.RAPSO_SYNTH_DATA);if(p&&typeof p==='object'){data.v2=Array.isArray(p.v2)?p.v2:[];data.v1=Array.isArray(p.v1)?p.v1:[];localStorage.setItem('rapsotracker',JSON.stringify({meta:{affaire:window.RAPSO_AFFAIRE||'',dossier:window.RAPSO_DOSSIER||''},data:{v2:data.v2,v1:data.v1}}));}}catch(e){}}setTimeout(()=>{const af=ge('affaireDisplay'),dos=ge('dossierInput');if(af && window.RAPSO_AFFAIRE) af.innerText = window.RAPSO_AFFAIRE;if(dos && window.RAPSO_DOSSIER) dos.value = window.RAPSO_DOSSIER;applyFilters();},0);})();

function makeRow(o={}){return{id:o.id||crypto.randomUUID(),num:o.num||'',ref:o.ref||'',date:o.date||'',inter:o.inter||'',disp:o.disp||'',avis:o.avis||'',desc:o.desc||'',obs:o.obs||'',docs:o.docs||'',suivi:o.suivi||'',repK:o.repK||'',repL:o.repL||'',lots:o.lots||'',rd6:o.rd6||false};}
function getRows(){return data[currentTab];}

function buildMfSelectOptions() {
  const rows = getRows();
  const intervenants = [...new Set(rows.map(r => cleanIntervenant(r.inter)).filter(v => v && v !== ''))];
  const interDiv = document.getElementById('mfInterDropdown');
  if (interDiv) {
    interDiv.innerHTML = intervenants.map(inter => `<label><input type="checkbox" value="${escapeHtmlAttr(inter)}" ${selectedIntervenants.has(inter) ? 'checked' : ''} onchange="toggleMultiFilter('inter', '${escapeHtmlAttr(inter)}', this.checked)"> ${escapeHtml(inter)}</label>`).join('');
  }
  document.getElementById('mfInterCount').innerText = `(${selectedIntervenants.size})`;
  const allLots = rows.flatMap(r => getLotsArray(r));
  const lots = [...new Set(allLots)];
  const lotDiv = document.getElementById('mfLotDropdown');
  if (lotDiv) {
    lotDiv.innerHTML = lots.map(lot => `<label><input type="checkbox" value="${escapeHtmlAttr(lot)}" ${selectedLots.has(lot) ? 'checked' : ''} onchange="toggleMultiFilter('lot', '${escapeHtmlAttr(lot)}', this.checked)"> ${escapeHtml(lot)}</label>`).join('');
  }
  document.getElementById('mfLotCount').innerText = `(${selectedLots.size})`;
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeHtmlAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function toggleMultiFilter(type,val,chk){if(type==='inter')chk?selectedIntervenants.add(val):selectedIntervenants.delete(val);else chk?selectedLots.add(val):selectedLots.delete(val);applyFilters();}
function toggleMfSelect(which){const id=which==='inter'?'mfInterDropdown':'mfLotDropdown';ge(id).classList.toggle('show');const other=which==='inter'?'mfLotDropdown':'mfInterDropdown';if(ge(other)&&ge(other)!==ge(id))ge(other).classList.remove('show');}
document.addEventListener('click',e=>{if(!e.target.closest('.mf-select'))document.querySelectorAll('.mf-select-dropdown').forEach(d=>d.classList.remove('show'));});

function gcf(id){return(ge(id)?.value||'').toLowerCase();}
function matchDate(stored,q){if(!q)return true;q=q.trim();const p=q.split('/');if(p.length>=2&&stored&&/^\d{4}-\d{2}-\d{2}$/.test(stored)){const[y,m,d]=stored.split('-'),fr=d+'/'+m+'/'+y;if(p.length>=3){let yy=p[2];if(yy.length===2)yy='20'+yy;return fr.startsWith(p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+yy);}return fr.startsWith(p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0'));}return String(stored||'').toLowerCase().includes(q);}
function applyFilters(){
  buildMfSelectOptions();
  const qn=gcf('qs_num'),qd=ge('qs_date')?.value||'',qdi=gcf('qs_disp'),qo=gcf('qs_obs'),qdo=gcf('qs_docs');
  const qF=ge('qs_F').checked,qS=ge('qs_S').checked,qD=ge('qs_D').checked,qPM=ge('qs_PM').checked,qSO=ge('qs_SO').checked;const anyQS=qF||qS||qD||qPM||qSO;
  const fOui=ge('fOui').checked,fPar=ge('fPar').checked,fNon=ge('fNon').checked,fRd6=ge('fRd6').checked,fPA=ge('fPA').checked;const anySt=fOui||fPar||fNon;
  let rows=getRows().filter(r=>{
    if(qn&&!String(r.num||'').toLowerCase().includes(qn))return false;
    if(qd&&!matchDate(r.date,qd))return false;
    if(qdi&&!String(r.disp||'').toLowerCase().includes(qdi))return false;
    if(qo&&!String(r.obs||'').toLowerCase().includes(qo))return false;
    if(qdo&&!String(r.docs||'').toLowerCase().includes(qdo))return false;
    if(anyQS){const a=(r.avis||'').toUpperCase().trim();if(!((qF&&a==='F')||(qS&&a==='S')||(qD&&a==='D')||(qPM&&a==='PM')||(qSO&&a==='SO')))return false;}
    if(anySt){if(!((fOui&&r.suivi==='Oui')||(fPar&&r.suivi==='Par')||(fNon&&r.suivi==='Non')))return false;}
    if(fRd6&&!r.rd6)return false;
    if(fPA&&!(r.num||'').toUpperCase().startsWith('PA'))return false;
    if(selectedIntervenants.size>0&&!selectedIntervenants.has(cleanIntervenant(r.inter)))return false;
    if(selectedLots.size>0){ const lotsArray = getLotsArray(r); if(!lotsArray.some(l=>selectedLots.has(l))) return false; }
    return true;
  });
  if(sortKey)rows.sort((a,b)=>{const av=String(a[sortKey]||''),bv=String(b[sortKey]||'');return av<bv?-sortDir:av>bv?sortDir:0;});
  filteredRows=rows;renderTable();updateStats();
}
function sortBy(k){sortKey===k?sortDir*=-1:(sortKey=k,sortDir=1);applyFilters();}
function resetFilters(){
  ['qs_num','qs_date','qs_disp','qs_obs','qs_docs'].forEach(id=>{const el=ge(id);if(el)el.value='';});
  ['qs_F','qs_S','qs_D','qs_PM','qs_SO','fOui','fPar','fNon','fRd6','fPA'].forEach(id=>ge(id).checked=false);
  selectedIntervenants.clear();selectedLots.clear();sortKey=null;sortDir=1;applyFilters();
}

// --- Colonnes ---
const COL_DEF = [
  {key:'num', label:'N°', visible:true, locked:true, width:'49px'},
  {key:'ref', label:'Réf', visible:true, width:'49px'},
  {key:'date', label:'Date', visible:true, width:'100px'},
  {key:'inter', label:'Intervenant', visible:true, width:'90px'},
  {key:'disp', label:'Dispositions', visible:true, width:'150px'},
  {key:'desc', label:'Description', visible:false, width:'130px'},
  {key:'avis', label:'Avis', visible:true, width:'37px'},
  {key:'obs', label:'Observations', visible:true, width:'220px'},
  {key:'docs', label:'Documents', visible:false, width:'100px'},
  {key:'suivi', label:'Suivi', visible:true, width:'61px'},
  {key:'repK', label:'Rép. MOE', visible:true, width:'180px'},
  {key:'repL', label:'Obs. SOCOTEC', visible:false, width:'180px'},
  {key:'lots', label:'Lots', visible:true, width:'80px'}
];
function loadColPrefs(){try{const s=localStorage.getItem('rs_col_prefs');if(s){const p=JSON.parse(s);COL_DEF.forEach(c=>{if(p[c.key]!==undefined)c.visible=p[c.key];});}}catch(e){}}
function saveColPrefs(){const p={};COL_DEF.forEach(c=>p[c.key]=c.visible);localStorage.setItem('rs_col_prefs',JSON.stringify(p));}
function rebuildTableHeader(){const hr=ge('headerRow');hr.innerHTML='';COL_DEF.forEach(c=>{if(c.visible){const th=document.createElement('th');th.textContent=c.label;th.style.width=c.width;th.onclick=()=>sortBy(c.key);th.style.cursor='pointer';hr.appendChild(th);}});const thAct=document.createElement('th');thAct.textContent='';thAct.style.width='44px';thAct.style.textAlign='center';hr.appendChild(thAct);}
function toggleColPicker() { const listDiv = document.getElementById('colModalBody'); listDiv.innerHTML = COL_DEF.map(c => `<label class="col-picker-item"><input type="checkbox" ${c.visible ? 'checked' : ''} ${c.locked ? 'disabled' : ''} onchange="toggleColumn('${c.key}', this.checked)"><span>${c.label}</span></label>`).join(''); document.getElementById('colModal').classList.add('open'); }
function closeColModal() { document.getElementById('colModal').classList.remove('open'); }
function buildColPickerList(){const list=ge('colPickerList');list.innerHTML=COL_DEF.map(c=>`<label class="col-picker-item"><input type="checkbox" ${c.visible?'checked':''} ${c.locked?'disabled':''} onchange="toggleColumn('${c.key}',this.checked)"><span>${c.label}</span></label>`).join('');}
function toggleColumn(key,vis){const col=COL_DEF.find(c=>c.key===key);if(col&&!col.locked){col.visible=vis;saveColPrefs();rebuildTableHeader();renderTable();}}
function resetColumns() { COL_DEF.forEach(c => { if (!c.locked) c.visible = true; }); saveColPrefs(); rebuildTableHeader(); renderTable(); const modalBody = document.getElementById('colModalBody'); if (modalBody) modalBody.innerHTML = COL_DEF.map(c => `<label class="col-picker-item"><input type="checkbox" ${c.visible ? 'checked' : ''} ${c.locked ? 'disabled' : ''} onchange="toggleColumn('${c.key}', this.checked)"><span>${c.label}</span></label>`).join(''); }
function fmtDate(d){if(!d)return'';if(/^\d{4}-\d{2}-\d{2}$/.test(d)){const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}return d;}
function renderTable(){
  const tbody=ge('tableBody'),empty=ge('emptyState');
  if(!filteredRows.length){tbody.innerHTML='';empty.style.display='flex';return;}
  empty.style.display='none';
  tbody.innerHTML=filteredRows.map((r,i)=>{
    const badge=r.suivi==='Oui'?'<span class="badge badge-oui">✓ Levé</span>':r.suivi==='Par'?'<span class="badge badge-par">~ Par.</span>':r.suivi==='Non'?'<span class="badge badge-non">✗ Non</span>':'<span class="badge badge-empty">—</span>';
    const rd6=r.rd6?'<span class="rd6-tag">RD6</span>':'';
    const interClean=cleanIntervenant(r.inter);
    let cells='';
    COL_DEF.forEach(c=>{
      if(!c.visible)return;
      if(c.key==='suivi')cells+=`<td>${badge}</td>`;
      else if(c.key==='num')cells+=`<td><span style="font-family:var(--mono);">${escapeHtml(r.num)}</span>${rd6}</td>`;
      else if(c.key==='date')cells+=`<td style="font-family:var(--mono);white-space:nowrap">${escapeHtml(fmtDate(r.date))}</td>`;
      else if(c.key==='ref')cells+=`<td style="font-family:var(--mono);font-size:.68rem">${escapeHtml(r.ref)}</td>`;
      else if(c.key==='inter')cells+=`<td>${escapeHtml(interClean)}</td>`;
      else cells+=`<td>${escapeHtml(r[c.key])}</td>`;
    });
    cells+=`<td class="col-actions"><button class="tb-btn" onclick="openEditPanel(${i})" style="padding:2px 8px;">Edit</button></td>`;
    return `<tr ondblclick="openEditPanel(${i})" id="row-${i}">${cells}</tr>`;
  }).join('');
}
function updateStats(){const rows=getRows();ge('statOui').textContent=rows.filter(r=>r.suivi==='Oui').length;ge('statPar').textContent=rows.filter(r=>r.suivi==='Par').length;ge('statNon').textContent=rows.filter(r=>r.suivi==='Non').length;ge('statTotal').textContent=rows.length;}
function switchTab(t){currentTab=t;ge('tabV2').classList.toggle('active',t==='v2');ge('tabV1').classList.toggle('active',t==='v1');resetFilters();}

// --- Panneau édition ---
function openEditPanel(fi){
  editingIdx=fi;const r=filteredRows[fi];
  ge('panelTitle').innerHTML=`Avis n°: ${r.num||'(vide)'} - ${r.ref||'-'} - ${fmtDate(r.date)||'-'} - ${cleanIntervenant(r.inter)||'-'} - Avis : ${r.avis||'-'}`;
  ge('panelNum').innerText=r.num||'(sans n°)';
  ge('e_lblColE').innerText=r.disp||'—';
  ge('e_obs_readonly').innerText=r.obs||'—';
  ge('e_repK').value=r.repK||'';ge('e_repL').value=r.repL||'';ge('e_lots').value=r.lots||'';
  ge('e_rd6').checked=r.rd6;ge('rd6Toggle').classList.toggle('active',r.rd6);
  currentSuivi=r.suivi;updateSuiviUI();
  ge('overlay').classList.add('open');ge('editPanel').classList.add('open');
  document.querySelectorAll('#tableBody tr').forEach(tr=>tr.classList.remove('row-highlight'));
  const el=ge('row-'+fi);if(el)el.classList.add('row-highlight');
}
function closePanel(){ge('overlay').classList.remove('open');ge('editPanel').classList.remove('open');editingIdx=null;}
function navRow(d){if(editingIdx!==null){let n=editingIdx+d;if(n>=0&&n<filteredRows.length)openEditPanel(n);}}
function setSuivi(v){currentSuivi=v;updateSuiviUI();}
function updateSuiviUI(){['oui','par','non','vide'].forEach(k=>{const el=ge('opt_'+k);if(el)el.classList.remove('sel-oui','sel-par','sel-non','sel-vide');});if(currentSuivi==='Oui')ge('opt_oui').classList.add('sel-oui');else if(currentSuivi==='Par')ge('opt_par').classList.add('sel-par');else if(currentSuivi==='Non')ge('opt_non').classList.add('sel-non');else ge('opt_vide')?.classList.add('sel-vide');}
function toggleRD6(){const cb=ge('e_rd6');cb.checked=!cb.checked;ge('rd6Toggle').classList.toggle('active',cb.checked);}
function saveRow(){
  if(editingIdx===null)return;
  const r=filteredRows[editingIdx];const gi=getRows().findIndex(x=>x.id===r.id);if(gi===-1)return;
  data[currentTab][gi]={...r,repK:ge('e_repK').value,repL:ge('e_repL').value,lots:ge('e_lots').value,suivi:currentSuivi,rd6:ge('e_rd6').checked};
  if(data[currentTab][gi].rd6&&!data[currentTab][gi].num.includes('/RD6'))data[currentTab][gi].num+='/RD6';
  else if(!data[currentTab][gi].rd6)data[currentTab][gi].num=data[currentTab][gi].num.replace('/RD6','');
  applyFilters();ge('saveFeedback').classList.add('show');setTimeout(()=>ge('saveFeedback').classList.remove('show'),1800);
  persistLocal();pushToParent();
}
function deleteRow(){if(editingIdx===null)return;const r=filteredRows[editingIdx];if(!confirm(`Supprimer définitivement l'avis ${r.num} ?`))return;const gi=getRows().findIndex(x=>x.id===r.id);if(gi>=0){data[currentTab].splice(gi,1);closePanel();applyFilters();persistLocal();pushToParent();}}

// --- Redimensionnement ---
(function(){
  const h = document.getElementById('epRh');
  const ep = document.getElementById('editPanel');
  let drag = false, sx = 0, sw = 0;
  const sv = parseInt(localStorage.getItem('rs_ep_w') || '520');
  ep.style.width = Math.max(340, Math.min(sv, window.innerWidth * 0.9)) + 'px';
  h.addEventListener('mousedown', function(e) {
    drag = true;
    sx = e.clientX;
    sw = ep.offsetWidth;
    h.classList.add('dragging');
    document.body.style.cssText = 'cursor:ew-resize;user-select:none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!drag) return;
    const nw = Math.max(340, Math.min(sw + (sx - e.clientX), window.innerWidth * 0.9));
    ep.style.width = nw + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (!drag) return;
    drag = false;
    h.classList.remove('dragging');
    document.body.style.cssText = '';
    localStorage.setItem('rs_ep_w', ep.offsetWidth);
  });
})();

// --- PA ---
function openPAModal(){
  ['pa_F','pa_S','pa_D','pa_PM'].forEach(id=>ge(id).checked=false);
  ['pa_disp','pa_obs','pa_repK','pa_repL','pa_lots'].forEach(id=>ge(id).value='');
  ge('pa_date').value = new Date().toISOString().slice(0,10);
  ge('paFeedback').innerText='';
  ge('paModal').classList.add('open');
}
function closePAModal(){ge('paModal').classList.remove('open');}
function addPA(){
  const cat=ge('pa_F').checked?'F':ge('pa_S').checked?'S':ge('pa_D').checked?'D':ge('pa_PM').checked?'PM':'';
  if(!cat){ge('paFeedback').innerText='⚠️ Cochez F, S, D ou PM';setTimeout(()=>ge('paFeedback').innerText='',2000);return;}
  let maxPA=0;getRows().forEach(r=>{if((r.num||'').startsWith('PA')){let n=parseInt(r.num.replace('PA',''));if(n>maxPA)maxPA=n;}});
  const paDate = ge('pa_date').value || new Date().toISOString().slice(0,10);
  data[currentTab].push(makeRow({num:'PA'+(maxPA+1),date:paDate,disp:ge('pa_disp').value,avis:cat,obs:ge('pa_obs').value,repK:ge('pa_repK').value,repL:ge('pa_repL').value,lots:ge('pa_lots').value}));
  closePAModal();applyFilters();persistLocal();pushToParent();
}

async function exportWithExcelJS() {
  if (typeof ExcelJS === 'undefined') { alert('La bibliothèque ExcelJS n\'est pas chargée…'); return; }
  try {
    const response = await fetch(TEMPLATE_URL);
    if (!response.ok) throw new Error(`Erreur réseau : HTTP ${response.status}`);
    const buffer = await response.arrayBuffer();
    const workbook = new ExcelJS.Workbook();
    await workbook.xlsx.load(buffer);
    let worksheet = workbook.getWorksheet('RapsoV2');
    if (!worksheet) { worksheet = workbook.worksheets[0]; if (!worksheet) throw new Error('Aucune feuille trouvée.'); }
    const rows = getRows();
    const affaire = document.getElementById('affaireDisplay').innerText.trim() || 'Sans nom';
    const dossier = document.getElementById('dossierInput').value.trim() || '';
    worksheet.getCell('B1').value = `Affaire : ${affaire}`;
    worksheet.getCell('B2').value = `Dossier : ${dossier}`;
    const lastRow = worksheet.rowCount;
    for (let r = 4; r <= lastRow; r++) { const row = worksheet.getRow(r); for (let c = 1; c <= 13; c++) { const cell = row.getCell(c); if (typeof cell.value !== 'object' || !cell.value || !cell.value.formula) { cell.value = null; } } }
    rows.forEach((r, i) => {
      const excelRowNum = 4 + i;
      const row = worksheet.getRow(excelRowNum);
      row.getCell(1).value = r.num; row.getCell(2).value = r.ref; row.getCell(3).value = fmtDate(r.date);
      row.getCell(4).value = cleanIntervenant(r.inter); row.getCell(5).value = r.disp; row.getCell(6).value = r.desc;
      row.getCell(7).value = r.avis; row.getCell(8).value = r.obs; row.getCell(9).value = r.docs;
      row.getCell(10).value = r.suivi; row.getCell(11).value = r.repK; row.getCell(12).value = r.repL; row.getCell(13).value = r.lots;
    });
    const bufferOut = await workbook.xlsx.writeBuffer();
    const blob = new Blob([bufferOut], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `Rapso_${affaire.replace(/[\\/:*?"<>|]/g, '_')}.xlsx`; a.click();
    URL.revokeObjectURL(url);
    alert('Fichier Excel téléchargé.');
  } catch (err) { alert('Erreur : ' + err.message); }
}

function normalizeDate(d){if(d instanceof Date) return d.toISOString().slice(0,10); if(!d) return ''; let t=String(d).trim().replace(/[-.]/g,'/'); let p=t.split('/'); if(p.length>=3){ let dd=+p[0],mm=+p[1],yy=+p[2]; if(yy<100)yy+=2000; if(!isNaN(dd)&&!isNaN(mm)&&!isNaN(yy)) return `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`; } let pd=new Date(t); return !isNaN(pd.getTime())?pd.toISOString().slice(0,10):''; }
function cleanDocs(v){if(!v)return'';let c=v.replace(/},{/g,'}\n{'); ['[','{','"ref"',':','null',',','"name"','.pdf',']','}'].forEach(m=>c=c.replace(new RegExp(m.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'')); c=c.replace(/"/g,''); return c.split('\n').map(l=>l.trim()&&!l.startsWith('.')?'.'+l.trim():l.trim()).join('\n'); }
function extractKey(v){if(!v)return'';let p=v.indexOf('/');return p>0?v.substring(0,p).trim():v.trim();}
function hasRappel(obs){if(!obs)return false;let s=String(obs);return s.includes("Rappel de l'observation précédente :")||s.includes("Rappel de l'observation précédente :")||s.includes("Rappel de l'observation précédente:")||s.includes("Rappel de l'observation précédente:");}

// ***** FONCTION PROCESSXLSX CORRIGÉE *****
function processXLSX(file, mode){
  const sid = mode==='actualiser' ? 'actualiserStatus' : 'importStatus';
  ge(sid).textContent = 'Lecture...';
  if (mode === 'actualiser') {
    const nomFichier = file.name.replace(/\.(xlsx|xlsm|xls)$/i,'');
    if (!confirm(`Attention ! Vous allez mettre à jour le dossier « ${nomFichier} ». Continuer ?`)) { ge(sid).textContent = 'Annulé.'; return; }
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      let sheetName = wb.SheetNames.find(n => n==='Synthèse') || wb.SheetNames.find(n => n==='RapsoV2') || wb.SheetNames.find(n => n==='RapsoV1') || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const baseName = file.name.replace(/\.(xlsx|xlsm|xls)$/i,'');
      ge('affaireDisplay').innerText = baseName;
      updateParentAffaire(baseName);
      const src = [];
      for (let i = 1; i < Math.min(raw.length, 500); i++) {
        const row = raw[i];
        if (!row || row.every(c => c==='')) continue;
        const nv = String(row[1]||'').trim();
        const obs = String(row[7]||'');
        let suivi = hasRappel(obs) ? 'Oui' : '';
        // LECTURE DU LOT : colonne M (index 12)
        const lotsValue = (row[12] !== undefined && row[12] !== null) ? String(row[12]).trim() : '';
        src.push(makeRow({
          num: nv,
          ref: String(row[0]||'').trim(),
          date: normalizeDate(row[2]),
          inter: String(row[3]||'').trim(),
          disp: String(row[4]||'').trim(),
          avis: String(row[5]||'').trim(),
          desc: String(row[6]||'').trim(),
          obs: obs,
          docs: cleanDocs(String(row[8]||'').trim()),
          suivi: suivi,
          repK: '', repL: '',
          lots: lotsValue,
          rd6: nv.includes('/RD6')
        }));
      }
      let target = sheetName==='RapsoV1' ? 'v1' : 'v2';
      if (mode === 'actualiser') {
        let ex = data[target];
        let up = 0, add = 0;
        for (const s of src) {
          const k = extractKey(s.num);
          if (!k) continue;
          const idx = ex.findIndex(t => extractKey(t.num) === k);
          if (idx >= 0) {
            ex[idx] = {...ex[idx], ...s, id:ex[idx].id};
            if (hasRappel(ex[idx].obs)) ex[idx].suivi = 'Oui';
            else ex[idx].suivi = '';
            up++;
          } else {
            ex.push(s);
            add++;
          }
        }
        ex.sort((a,b) => extractKey(a.num).localeCompare(extractKey(b.num), undefined, {numeric:true}));
        data[target] = ex;
        currentTab = target;
        ge(sid).textContent = `✅ ${up} mis à jour, ${add} ajoutés`;
      } else {
        if (!confirm(`${src.length} lignes → ${target} ?\n⚠️ Remplace tout`)) { ge(sid).textContent = 'Annulé.'; return; }
        data[target] = src;
        currentTab = target;
        ge(sid).textContent = `✅ ${src.length} avis importés`;
      }
      ge('tabV2').classList.toggle('active', target==='v2');
      ge('tabV1').classList.toggle('active', target==='v1');
      selectedIntervenants.clear(); selectedLots.clear();
      applyFilters(); persistLocal(); pushToParent();
    } catch (err) { ge(sid).textContent = '❌ ' + err.message; }
  };
  reader.readAsArrayBuffer(file);
}

      for (let i = 3; i < Math.min(raw.length, 500); i++) {
        const row = raw[i];
        if (!row || row.every(c => c === '')) continue;
        const num = String(row[0] || '').trim();
        const ref = String(row[1] || '').trim();
        const date = normalizeDate(row[2]);
        const inter = String(row[3] || '').trim();
        const disp = String(row[4] || '').trim();
        const desc = String(row[5] || '').trim();
        const avis = String(row[6] || '').trim();
        const obs = String(row[7] || '');
        const docs = cleanDocs(String(row[8] || '').trim());
        const suivi = String(row[9] || '').trim();
        const repK = String(row[10] || '').trim();
        const repL = String(row[11] || '').trim();
        const lots = String(row[12] || '').trim();
        src.push(makeRow({ num, ref, date, inter, disp, desc, avis, obs, docs, suivi, repK, repL, lots, rd6: num.includes('/RD6') }));
      }
      if (src.length === 0) { statusEl.textContent = 'Aucune donnée trouvée.'; return; }
      if (!confirm(`${src.length} avis vont être importés dans ${currentTab}. Continuer ?`)) { statusEl.textContent = 'Annulé.'; return; }
      data[currentTab] = src;
      selectedIntervenants.clear(); selectedLots.clear();
      applyFilters(); persistLocal(); pushToParent();
      statusEl.textContent = `✅ ${src.length} avis importés avec succès.`;
      closeMigrationModal();
    } catch (err) { statusEl.textContent = '❌ Erreur : ' + err.message; }
  };
  reader.readAsArrayBuffer(file);
}
const migrationDropzone = document.getElementById('migrationDropzone');
if (migrationDropzone) {
  migrationDropzone.addEventListener('dragover', e => { e.preventDefault(); migrationDropzone.style.borderColor = 'var(--blue)'; });
  migrationDropzone.addEventListener('dragleave', () => migrationDropzone.style.borderColor = '');
  migrationDropzone.addEventListener('drop', e => { e.preventDefault(); migrationDropzone.style.borderColor = ''; const file = e.dataTransfer.files[0]; if (file) { document.getElementById('migrationFileInput').files = e.dataTransfer.files; handleMigrationFileImport({ files: [file] }); } });
}

function exportJSON(){const meta={affaire:ge('affaireDisplay').innerText,dossier:ge('dossierInput').value};const blob=new Blob([JSON.stringify({meta,data},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rapso_'+(meta.affaire||'data')+'.json';a.click();}
function loadJSON(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const o=JSON.parse(ev.target.result);if(o.meta){ge('affaireDisplay').innerText=o.meta.affaire||'';ge('dossierInput').value=o.meta.dossier||'';}if(o.data){data.v2=(o.data.v2||[]).map(makeRow);data.v1=(o.data.v1||[]).map(makeRow);}selectedIntervenants.clear();selectedLots.clear();applyFilters();persistLocal();pushToParent();alert('✅');}catch(e){alert('JSON invalide');}};r.readAsText(f);};inp.click();}
function loadLocal(){if(window.RAPSO_SYNTH_DATA)return;try{const r=localStorage.getItem('rapsotracker');if(!r)return;const o=JSON.parse(r);if(o.meta){ge('affaireDisplay').innerText=o.meta.affaire||'';ge('dossierInput').value=o.meta.dossier||'';}if(o.data){data.v2=(o.data.v2||[]).map(makeRow);data.v1=(o.data.v1||[]).map(makeRow);}applyFilters();}catch(e){}}
function ge(id){return document.getElementById(id);}

loadColPrefs(); buildColPickerList(); rebuildTableHeader(); loadLocal(); applyFilters();
</script>
